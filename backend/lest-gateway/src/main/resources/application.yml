server:
  port: 8080

spring:
  application:
    name: lest-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

  # Redis (for rate limiter)
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # Nacos service discovery
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:true}
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_APP_GROUP:DEFAULT_GROUP}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}

    # Gateway routes - Spring Cloud Gateway 5.x uses server.webflux prefix
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: lest-auth
              uri: lb://lest-auth
              predicates:
                - Path=/auth/**
              filters:
                - ValidateCodeFilter
                - StripPrefix=1

            - id: lest-system
              uri: lb://lest-system
              predicates:
                - Path=/system/**
              filters:
                - StripPrefix=1

            - id: lest-monitor
              uri: lb://lest-system
              predicates:
                - Path=/monitor/**
              filters:
                - StripPrefix=1

            - id: lest-job
              uri: lb://lest-job
              predicates:
                - Path=/job/**
              filters:
                - StripPrefix=1

            - id: lest-project
              uri: lb://lest-project
              predicates:
                - Path=/project/**
              filters:
                - StripPrefix=1

            - id: lest-task
              uri: lb://lest-task
              predicates:
                - Path=/task/**
              filters:
                - StripPrefix=1

            - id: lest-meeting
              uri: lb://lest-meeting
              predicates:
                - Path=/meeting/**
              filters:
                - StripPrefix=1

            - id: lest-file
              uri: lb://lest-file
              predicates:
                - Path=/file/**
              filters:
                - StripPrefix=1

            - id: lest-notification
              uri: lb://lest-notification
              predicates:
                - Path=/notification/**
              filters:
                - StripPrefix=1

            - id: lest-ai
              uri: lb://lest-ai
              predicates:
                - Path=/ai/**
              filters:
                - StripPrefix=1

            - id: lest-performance
              uri: lb://lest-performance
              predicates:
                - Path=/performance/**
              filters:
                - StripPrefix=1

            - id: lest-open
              uri: lb://lest-open
              predicates:
                - Path=/open/**
              filters:
                - StripPrefix=1

            - id: lest-release
              uri: lb://lest-release
              predicates:
                - Path=/release/**
              filters:
                - StripPrefix=1

            - id: lest-plugin
              uri: lb://lest-plugin
              predicates:
                - Path=/plugin/**
              filters:
                - StripPrefix=1

            - id: lest-wakapi
              uri: lb://lest-wakapi
              predicates:
                - Path=/wakapi/**
              filters:
                - StripPrefix=1

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Resilience4j circuit breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      lest-auth-cb:
        baseConfig: default
      lest-system-cb:
        baseConfig: default

# Sentinel flow control
spring.cloud.sentinel:
  enabled: true
  eager:
    # Register with Sentinel WebFlux adapter immediately on startup
    enabled: true
  transport:
    # Sentinel dashboard address (optional - set when dashboard is available)
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:9090}
    port: 8719
  filter:
    # Enable URL cleanup (remove trailing slashes, etc.)
    urlCleanup: true
  scg:
    # Spring Cloud Gateway Sentinel adapter
    fallback:
      # Fallback response when flow control is triggered
      mode: response
      response-status: 429
      response-body: '{"code":429,"msg":"请求过于频繁，请稍后再试"}'

# Sentinel Dashboard (local config - configure SENTINEL_DASHBOARD env var for production)
# Default port for Sentinel dashboard: 9090 (add to docker-compose.yml)
  level:
    org.springframework.cloud.gateway: INFO
    com.lest.gateway: DEBUG

# Security Config
security:
  captcha:
    enabled: true
    type: char
  ignore:
    whites:
      - /auth/**
      - /code
      - /doc.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /webjars/**
      - /favicon.ico
      - /actuator/**
      - /open/**
