
services:
  # 1. Nacos 注册/配置中心 (lest-Cloud 核心)
  lest-nacos:
    # 使用 latest 拉取最新版本
    image: nacos/nacos-server:latest
    container_name: lest-nacos
    environment:
      - MODE=standalone # 单机模式启动
      - JVM_XMS=512m
      - JVM_XMX=512m
      - NACOS_AUTH_ENABLE=false # 本地开发关闭鉴权，方便调试
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - NACOS_AUTH_IDENTITY_KEY=lest-platform-key
      - NACOS_AUTH_IDENTITY_VALUE=lest-platform-value
    volumes:
      - ./nacos/logs:/home/nacos/logs
    ports:
      - "8848:8848"      # HTTP API 端口
      - "18848:8080"     # 控制台端口（容器 8080 → 本机 18848，避免与本地网关 8080 冲突）
      - "9848:9848" # Nacos 2.x 必须开放的 gRPC 端口
      - "9849:9849"

  # 2. Sentinel 流量控制面板
  lest-sentinel:
    # 使用 latest 拉取最新版本
    image: bladex/sentinel-dashboard:latest
    container_name: lest-sentinel
    ports:
      - "8858:8858" # 控制台端口，容器和本机都使用 8858，避免与网关 8080 冲突

  # 3. MinIO 对象存储 (lest 默认集成的文件上传组件)
  lest-minio:
    # 使用 latest 拉取最新版本
    image: minio/minio:latest
    container_name: lest-minio
    ports:
      - "9000:9000" # API 端口
      - "9001:9001" # Web 控制台端口
    environment:
      - MINIO_ROOT_USER=lest # 默认账号
      - MINIO_ROOT_PASSWORD=lest12345 # 默认密码（至少8位）
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
