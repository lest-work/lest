# Production docker-compose: uses pre-built images from GHCR
# Use with: docker compose -f docker-compose.prod.yml {up|pull}
version: '3.8'
services:
  lest-nacos:
    container_name: lest-nacos
    image: nacos/nacos-server:v3.0.2
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=TGVzdFBsYXRmb3JtTmFjb3NBdXRoU2VjcmV0S2V5MjAyNg==
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - lest-mysql
    restart: unless-stopped

  lest-mysql:
    container_name: lest-mysql
    image: mysql:8.0
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1'
    ]
    environment:
      MYSQL_DATABASE: 'lest_platform'
      MYSQL_ROOT_PASSWORD: '12345678'
    restart: unless-stopped

  lest-redis:
    container_name: lest-redis
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/lest/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/lest/redis/redis.conf
    restart: unless-stopped

  lest-nginx:
    container_name: lest-nginx
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/nginx:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/lest/projects/lest-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - lest-gateway
    links:
      - lest-gateway
    restart: unless-stopped

  lest-gateway:
    container_name: lest-gateway
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/gateway:${IMAGE_TAG:-latest}
    ports:
      - "18080:8080"
    environment:
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
      - NACOS_USERNAME=nacos
      - NACOS_PASSWORD=nacos
    depends_on:
      - lest-redis
      - lest-nacos
    links:
      - lest-redis
    restart: unless-stopped

  lest-auth:
    container_name: lest-auth
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/auth:${IMAGE_TAG:-latest}
    ports:
      - "9200:9200"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-redis
      - lest-mysql
      - lest-nacos
    links:
      - lest-redis
      - lest-mysql
    restart: unless-stopped

  lest-modules-system:
    container_name: lest-modules-system
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-system:${IMAGE_TAG:-latest}
    ports:
      - "9201:9201"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-redis
      - lest-mysql
      - lest-nacos
    links:
      - lest-redis
      - lest-mysql
    restart: unless-stopped

  lest-modules-job:
    container_name: lest-modules-job
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-job:${IMAGE_TAG:-latest}
    ports:
      - "9203:9203"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-mysql
      - lest-redis
      - lest-nacos
    links:
      - lest-mysql
      - lest-redis
    restart: unless-stopped

  lest-modules-file:
    container_name: lest-modules-file
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-file:${IMAGE_TAG:-latest}
    ports:
      - "9300:9300"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-mysql
      - lest-redis
      - lest-nacos
    links:
      - lest-mysql
      - lest-redis
    volumes:
      - ./lest/uploadPath:/home/lest/uploadPath
    restart: unless-stopped

  lest-modules-project:
    container_name: lest-modules-project
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-project:${IMAGE_TAG:-latest}
    ports:
      - "9400:9400"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-mysql
      - lest-redis
      - lest-nacos
    links:
      - lest-mysql
      - lest-redis
    restart: unless-stopped

  lest-modules-task:
    container_name: lest-modules-task
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-task:${IMAGE_TAG:-latest}
    ports:
      - "9401:9401"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-mysql
      - lest-redis
      - lest-nacos
    links:
      - lest-mysql
      - lest-redis
    restart: unless-stopped

  lest-modules-release:
    container_name: lest-modules-release
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/modules-release:${IMAGE_TAG:-latest}
    ports:
      - "9402:9402"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=12345678
      - REDIS_HOST=lest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345678
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-mysql
      - lest-redis
      - lest-nacos
    links:
      - lest-mysql
      - lest-redis
    restart: unless-stopped

  lest-visual-monitor:
    container_name: lest-visual-monitor
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lest-team}/lest-platform/visual-monitor:${IMAGE_TAG:-latest}
    ports:
      - "9100:9100"
    environment:
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-nacos
    restart: unless-stopped
