version : '3.8'
services:
  lest-nacos:
    container_name: lest-nacos
    image: nacos/nacos-server:v3.0.2
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=your_auth_token
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
    ports:
      - "18848:8848"
      - "19848:9848"
      - "19849:9849"
    depends_on:
      - lest-mysql
  lest-mysql:
    container_name: lest-mysql
    image: mysql:8.0
    build:
      context: ./mysql
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]
    environment:
      MYSQL_DATABASE: 'lest_platform'
      MYSQL_ROOT_PASSWORD: password
  lest-redis:
    container_name: lest-redis
    image: redis
    build:
      context: ./redis
    ports:
      - "6380:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/lest/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/lest/redis/redis.conf
  lest-nginx:
    container_name: lest-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/lest/projects/lest-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - lest-gateway
    links:
      - lest-gateway
  lest-gateway:
    container_name: lest-gateway
    build:
      context: ./lest/gateway
      dockerfile: dockerfile
    ports:
      - "18080:8080"
    environment:
      - REDIS_HOST=lest-redis
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
      - NACOS_USERNAME=nacos
      - NACOS_PASSWORD=nacos
    depends_on:
      - lest-redis
      - lest-nacos
    links:
      - lest-redis
  lest-auth:
    container_name: lest-auth
    build:
      context: ./lest/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - lest-redis
    links:
      - lest-redis
  lest-modules-system:
    container_name: lest-modules-system
    build:
      context: ./lest/modules/system
      dockerfile: dockerfile
    ports:
      - "18081:8081"
    environment:
      - MYSQL_HOST=lest-mysql
      - MYSQL_DB=lest_platform
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=password
      - REDIS_HOST=lest-redis
      - NACOS_HOST=lest-nacos
      - NACOS_PORT=8848
    depends_on:
      - lest-redis
      - lest-mysql
      - lest-nacos
    links:
      - lest-redis
      - lest-mysql
  lest-modules-job:
    container_name: lest-modules-job
    build:
      context: ./lest/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - lest-mysql
    links:
      - lest-mysql
  lest-modules-file:
    container_name: lest-modules-file
    build:
      context: ./lest/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./lest/uploadPath:/home/lest/uploadPath
  lest-modules-project:
    container_name: lest-modules-project
    build:
      context: ./lest/modules/project
      dockerfile: dockerfile
    ports:
      - "9400:9400"
    depends_on:
      - lest-mysql
      - lest-redis
    links:
      - lest-mysql
      - lest-redis
  lest-modules-task:
    container_name: lest-modules-task
    build:
      context: ./lest/modules/task
      dockerfile: dockerfile
    ports:
      - "9401:9401"
    depends_on:
      - lest-mysql
      - lest-redis
    links:
      - lest-mysql
      - lest-redis
  lest-modules-release:
    container_name: lest-modules-release
    build:
      context: ./lest/modules/release
      dockerfile: dockerfile
    ports:
      - "9402:9402"
    depends_on:
      - lest-mysql
      - lest-redis
    links:
      - lest-mysql
      - lest-redis
  lest-visual-monitor:
    container_name: lest-visual-monitor
    build:
      context: ./lest/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
