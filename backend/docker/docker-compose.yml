version: '3.8'

services:
  # ========================
  # 基础架构 (Infrastructure)
  # ========================

  # Nacos 注册/配置中心
  lest-nacos:
    container_name: lest-nacos
    image: nacos/nacos-server:v3.0.2
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - NACOS_AUTH_ENABLE=false
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - NACOS_AUTH_IDENTITY_KEY=lest-platform-key
      - NACOS_AUTH_IDENTITY_VALUE=lest-platform-value
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "18848:8080"
      - "9848:9848"
      - "9849:9849"
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel 流量控制面板
  lest-sentinel:
    container_name: lest-sentinel
    image: bladex/sentinel-dashboard:latest
    ports:
      - "8858:8858"
    network_mode: host

  # MinIO 对象存储
  lest-minio:
    container_name: lest-minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=lest
      - MINIO_ROOT_PASSWORD=lest12345
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    network_mode: host

  # ========================
  # 应用服务 (Application)
  # ========================

  # API 网关
  lest-gateway:
    container_name: lest-gateway
    build:
      context: ./lest
      dockerfile: gateway/dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_HOST=127.0.0.1
      - NACOS_PORT=8848
      - NACOS_ENABLED=true
      - NACOS_REGISTER_ENABLED=true
      - REDIS_HOST=host.docker.internal
      - SENTINEL_DASHBOARD=127.0.0.1:8858
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lest-nacos
    network_mode: host

  # 认证服务
  lest-auth:
    container_name: lest-auth
    build:
      context: ./lest/auth
      dockerfile: dockerfile
    ports:
      - "8096:8096"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_HOST=127.0.0.1
      - NACOS_PORT=8848
      - NACOS_ENABLED=true
      - NACOS_REGISTER_ENABLED=true
      - REDIS_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lest-nacos
    network_mode: host

  # 系统服务
  lest-modules-system:
    container_name: lest-modules-system
    build:
      context: ./lest/modules/system
