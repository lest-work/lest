plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    // Spring Boot WebFlux (required for reactive stack — provides WebServerInitializedEvent, Netty auto-config)
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Spring Cloud Gateway (WebFlux/Reactive)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway-server-webflux'

    // Nacos service discovery
    implementation "com.alibaba.cloud:spring-cloud-starter-alibaba-nacos-discovery:${rootProject.ext.nacosVersion}"

    // Load balancer (needed for lb:// routes)
    implementation 'org.springframework.cloud:spring-cloud-starter-loadbalancer'

    // Redis for rate limiting / token relay
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'
    implementation 'org.apache.commons:commons-pool2'

    // Circuit breaker — exclude resilience4j-spring-boot3 autoconfigure to avoid bean conflict with Boot 4
    implementation('org.springframework.cloud:spring-cloud-starter-circuitbreaker-reactor-resilience4j') {
        exclude group: 'io.github.resilience4j', module: 'resilience4j-spring-boot3'
    }
    implementation "io.github.resilience4j:resilience4j-spring-boot4:${rootProject.ext.resilience4jVersion}"
    implementation "io.github.resilience4j:resilience4j-reactor:${rootProject.ext.resilience4jVersion}"

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor platform("org.springframework.boot:spring-boot-dependencies:${springBootVersion}")
    annotationProcessor 'org.projectlombok:lombok'
}
