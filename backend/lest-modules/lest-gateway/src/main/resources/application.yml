server:
  port: 8080

spring:
  application:
    name: lest-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

  # Redis (for rate limiter)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # Nacos service discovery
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP

    # Gateway routes - dynamic via Nacos service discovery
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Static routes (with lb:// for load-balanced service discovery)
      routes:
        - id: lest-auth
          uri: lb://lest-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: lest-auth-cb
                fallbackUri: forward:/fallback

        - id: lest-system
          uri: lb://lest-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: lest-system-cb
                fallbackUri: forward:/fallback

        - id: lest-project
          uri: lb://lest-project
          predicates:
            - Path=/project/**
          filters:
            - StripPrefix=1

        - id: lest-task
          uri: lb://lest-task
          predicates:
            - Path=/task/**
          filters:
            - StripPrefix=1

        - id: lest-code
          uri: lb://lest-code
          predicates:
            - Path=/code/**
          filters:
            - StripPrefix=1

        - id: lest-meeting
          uri: lb://lest-meeting
          predicates:
            - Path=/meeting/**
          filters:
            - StripPrefix=1

        - id: lest-file
          uri: lb://lest-file
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1

        - id: lest-notification
          uri: lb://lest-notification
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        - id: lest-ai
          uri: lb://lest-ai
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1

        - id: lest-performance
          uri: lb://lest-performance
          predicates:
            - Path=/performance/**
          filters:
            - StripPrefix=1

        - id: lest-open
          uri: lb://lest-open
          predicates:
            - Path=/open/**
          filters:
            - StripPrefix=1

        - id: lest-release
          uri: lb://lest-release
          predicates:
            - Path=/release/**
          filters:
            - StripPrefix=1

        - id: lest-plugin
          uri: lb://lest-plugin
          predicates:
            - Path=/plugin/**
          filters:
            - StripPrefix=1

        - id: lest-wakapi
          uri: lb://lest-wakapi
          predicates:
            - Path=/wakapi/**
          filters:
            - StripPrefix=1

      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Resilience4j circuit breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      lest-auth-cb:
        baseConfig: default
      lest-system-cb:
        baseConfig: default

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.lest.gateway: DEBUG
