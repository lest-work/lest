name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Pre-release version (e.g., v0.3.0-alpha.1, v0.3.0-beta.1, v0.3.0-rc.1)'
        required: true
        type: string
      preid:
        description: 'Pre-release identifier (alpha, beta, rc)'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
      notes:
        description: 'Pre-release notes (optional)'
        required: false
        type: string

jobs:
  pre-release:
    name: Create Pre-Release ${{ github.event.inputs.version }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Creating pre-release: $VERSION"

          # Validate format: v{MAJOR}.{MINOR}.{PATCH}-{preid}.{n}
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)\.[0-9]+$'; then
            echo "❌ Invalid version format."
            echo "Expected format: v0.3.0-alpha.1, v0.3.0-beta.2, v0.3.0-rc.1"
            exit 1
          fi

          echo "✅ Version format validated"

      - name: Create annotated tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NOTES="${{ github.event.inputs.notes }}"

          if [ -z "$NOTES" ]; then
            NOTES="Pre-release $VERSION"
          fi

          git tag -a "$VERSION" -m "$NOTES"
          git push origin "$VERSION"
          echo "✅ Tag $VERSION pushed"

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Pre-Release ${{ github.event.inputs.version }}
          body: |
            ## ${{ github.event.inputs.notes || 'Pre-release' }}

            **This is a pre-release version.** It contains the latest development changes but may be unstable.

            ### Versioning
            - `alpha` — Early development preview, APIs may change
            - `beta` — Feature complete, testing in progress
            - `rc` (Release Candidate) — Ready for production testing

            ### Installation

            ```bash
            # Pull the pre-release Docker image
            docker pull ghcr.io/yshan2028/lest-platform/gateway:${{ github.event.inputs.version }}

            # Or clone and build from source
            git clone https://github.com/yshan2028/Lest.git
            cd Lest
            git checkout ${{ github.event.inputs.version }}
            ```

            ### Upgrade Notes

            Please check the [CHANGELOG.md](https://github.com/yshan2028/Lest/blob/main/CHANGELOG.md) for breaking changes.

            ### Feedback

            Report issues at: https://github.com/yshan2028/Lest/issues
          draft: false
          prerelease: true
        continue-on-error: true
