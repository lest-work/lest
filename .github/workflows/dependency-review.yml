name: 'Dependency Review'
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Vulnerability Review
    runs-on: ubuntu-24.04
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
          license-check: true
          # Allow known open-source licenses
          allow-licenses: >
            Apache-2.0,
            MIT,
            BSD-2-Clause,
            BSD-3-Clause,
            MPL-2.0,
            ISC,
            Python-2.0,
            Unlicense,
            CC0-1.0
          deny-licenses: >
            GPL-1.0,
            GPL-2.0,
            GPL-3.0,
            AGPL-1.0,
            AGPL-3.0,
            LGPL-2.0,
            LGPL-2.1,
            LGPL-3.0,
            EUPL-1.1,
            EUPL-1.2,
            LPPL-1.0,
            OSL-1.0,
            Sleepycat
