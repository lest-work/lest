name: 'CodeQL'

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.java'
      - '**.js'
      - '**.ts'
      - '**.vue'
      - '**.xml'
      - '**.yml'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.java'
      - '**.js'
      - '**.ts'
      - '**.vue'
      - '**.xml'
      - '**.yml'
      - '.github/workflows/codeql.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-java:
    name: CodeQL (Java / Maven)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build
        run: mvn compile -DskipTests -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java'

  codeql-javascript:
    name: CodeQL (JavaScript / TypeScript)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install dependencies & Type check
        run: |
          npm ci
          npx vue-tsc --noEmit

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  codeql-summary:
    name: CodeQL Summary
    needs: [codeql-java, codeql-javascript]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Java analysis: ${{ needs.codeql-java.result }}"
          echo "JS/TS analysis: ${{ needs.codeql-javascript.result }}"
