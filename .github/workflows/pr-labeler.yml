name: 'PR Auto Labeler'

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-pr:
    name: Label PR by Changed Files
    runs-on: ubuntu-24.04
    steps:
      - name: Label by path
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Auto-label by branch name
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [];
            const head = context.payload.pull_request.head.ref;

            if (head.startsWith('feat/')) labels.push('feature');
            if (head.startsWith('fix/')) labels.push('bug');
            if (head.startsWith('chore/')) labels.push('chore');
            if (head.startsWith('docs/')) labels.push('documentation');
            if (head.startsWith('refactor/')) labels.push('refactoring');
            if (head.startsWith('perf/')) labels.push('performance');
            if (head.startsWith('test/')) labels.push('testing');

            for (const label of labels) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: [label]
                });
              } catch (e) {
                // label already exists, skip
              }
            }
