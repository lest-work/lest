name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'backend/**'
      - 'frontend-pc/**'
      - 'docker-dev.Dockerfile'
      - 'docker-compose.dev.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend-pc/**'
      - 'docker-dev.Dockerfile'
      - 'docker-compose.dev.yml'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx1024m -Xms512m

jobs:
  # ==================== 后端构建 & 测试 ====================
  backend-build:
    name: Backend Build (JDK ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Upload backend JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            backend/lest-gateway/target/lest-gateway-*.jar
            backend/lest-auth/target/lest-auth-*.jar
            backend/lest-modules/lest-system/target/lest-system-*.jar
            backend/lest-modules/lest-job/target/lest-job-*.jar
            backend/lest-modules/lest-file/target/lest-file-*.jar
            backend/lest-modules/lest-project/target/lest-project-*.jar
            backend/lest-modules/lest-task/target/lest-task-*.jar
            backend/lest-modules/lest-release/target/lest-release-*.jar
            backend/lest-visual/lest-monitor/target/lest-monitor-*.jar
          retention-days: 1

      - name: Upload Maven cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-maven-cache
          path: ~/.m2/repository
          retention-days: 3

  backend-test:
    name: Backend Test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Run tests
        run: mvn test -B --fail-at-end
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/target/surefire-reports/
          retention-days: 7
          ignore-no-files: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/**/target/site/jacoco/
          retention-days: 7
          ignore-no-files: true

  # ==================== 前端构建 ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:eslint -- --max-warnings 0
        continue-on-error: true

      - name: Type check
        run: npx vue-tsc --noEmit
        continue-on-error: true

      - name: Build for dev
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-pc/dist/
          retention-days: 1

  # ==================== Docker 镜像构建测试 ====================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-24.04
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download backend JARs
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: backend/lest-gateway/target/
        # Download all other service jars
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-pc/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare JAR directory structure for Docker
        run: |
          mkdir -p backend/lest-gateway/jar
          mkdir -p backend/lest-auth/jar
          mkdir -p backend/lest-modules/lest-system/jar
          mkdir -p backend/lest-modules/lest-job/jar
          mkdir -p backend/lest-modules/lest-file/jar
          mkdir -p backend/lest-modules/lest-project/jar
          mkdir -p backend/lest-modules/lest-task/jar
          mkdir -p backend/lest-modules/lest-release/jar
          mkdir -p backend/lest-visual/lest-monitor/jar
          # Copy JARs
          cp backend/lest-gateway/target/lest-gateway-*.jar backend/lest-gateway/jar/lest-gateway.jar
          cp backend/lest-auth/target/lest-auth-*.jar backend/lest-auth/jar/lest-auth.jar
          cp backend/lest-modules/lest-system/target/lest-system-*.jar backend/lest-modules/lest-system/jar/lest-modules-system.jar
          cp backend/lest-modules/lest-job/target/lest-job-*.jar backend/lest-modules/lest-job/jar/lest-modules-job.jar
          cp backend/lest-modules/lest-file/target/lest-file-*.jar backend/lest-modules/lest-file/jar/lest-modules-file.jar
          cp backend/lest-modules/lest-project/target/lest-project-*.jar backend/lest-modules/lest-project/jar/lest-modules-project.jar
          cp backend/lest-modules/lest-task/target/lest-task-*.jar backend/lest-modules/lest-task/jar/lest-modules-task.jar
          cp backend/lest-modules/lest-release/target/lest-release-*.jar backend/lest-modules/lest-release/jar/lest-modules-release.jar
          cp backend/lest-visual/lest-monitor/target/lest-monitor-*.jar backend/lest-visual/lest-monitor/jar/lest-visual-monitor.jar

      - name: Prepare frontend dist
        run: |
          mkdir -p backend/docker/nginx/html/dist
          cp -r frontend-pc/dist/* backend/docker/nginx/html/dist/

      - name: Build gateway image
        run: |
          docker build \
            --build-arg MODULE=lest-gateway \
            --build-arg SERVICE_PORT=8080 \
            -t lest-gateway:test \
            -f docker-dev.Dockerfile \
            ./backend || echo "Gateway build failed"

      - name: Build auth image
        run: |
          docker build \
            --build-arg MODULE=lest-auth \
            --build-arg SERVICE_PORT=8096 \
            -t lest-auth:test \
            -f docker-dev.Dockerfile \
            ./backend || echo "Auth build failed"

      - name: Build nginx image
        run: |
          docker build \
            -t lest-nginx:test \
            -f backend/docker/nginx/dockerfile \
            ./backend || echo "Nginx build failed"

      - name: Images manifest
        run: |
          echo "=== Built images ===" && docker images lest-*/test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: trivy-fs-results.sarif
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy FS results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
        continue-on-error: true

      - name: Run Trivy on Docker images
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'lest-gateway:test'
          format: 'table'
          exit-code: '0'
        continue-on-error: true

  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Backend: Checkstyle
        run: |
          cd backend && mvn checkstyle:check -q || true
        continue-on-error: true

      - name: Frontend: ESLint
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json
        run: |
          cd frontend-pc && npm ci && npm run lint:eslint -- --format stylish || true

  # ==================== CI 总结 ====================
  ci-summary:
    name: CI Summary
    needs: [backend-build, backend-test, frontend-build, docker-build]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: CI Result Summary
        run: |
          echo "## CI Build Summary"
          echo "| Job | Status |"
          echo "|------|--------|"
          echo "| Backend Build | ${{ needs.backend-build.result == 'success' && '✅' || '❌' }} |"
          echo "| Backend Test | ${{ needs.backend-test.result == 'success' && '✅' || '⚠️' }} |"
          echo "| Frontend Build | ${{ needs.frontend-build.result == 'success' && '✅' || '❌' }} |"
          echo "| Docker Build | ${{ needs.docker-build.result == 'success' && '✅' || '❌' }} |"
