name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'backend/**'
      - 'frontend-pc/**'
      - 'backend/docker/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend-pc/**'
      - 'backend/docker/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx1024m -Xms512m

jobs:
  # ==================== 后端构建 ====================
  backend-build:
    name: Backend Build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Upload backend JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            lest-gateway/target/lest-gateway-*.jar
            lest-auth/target/lest-auth-*.jar
            lest-modules/lest-system/target/lest-system-*.jar
            lest-modules/lest-project/target/lest-project-*.jar
            lest-modules/lest-task/target/lest-task-*.jar
            lest-modules/lest-release/target/lest-release-*.jar
            lest-modules/lest-job/target/lest-job-*.jar
            lest-modules/lest-file/target/lest-file-*.jar
            lest-modules/lest-meeting/target/lest-meeting-*.jar
            lest-modules/lest-notification/target/lest-notification-*.jar
            lest-modules/lest-ai/target/lest-ai-*.jar
            lest-modules/lest-open/target/lest-open-*.jar
            lest-modules/lest-performance/target/lest-performance-*.jar
            lest-modules/lest-plugin/target/lest-plugin-*.jar
            lest-modules/lest-wakapi/target/lest-wakapi-*.jar
            lest-visual/lest-monitor/target/lest-monitor-*.jar
          retention-days: 1

  # ==================== 后端测试 ====================
  backend-test:
    name: Backend Test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Run tests
        run: mvn test -B --fail-at-end
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/target/surefire-reports/'
          retention-days: 7
          ignore-no-files: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: '**/target/site/jacoco/'
          retention-days: 7
          ignore-no-files: true

  # ==================== 后端代码分析 (SonarCloud) ====================
  backend-sonar:
    name: Backend SonarCloud Analysis
    runs-on: ubuntu-24.04
    needs: [backend-build]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=yshan2028_Lest \
            -Dsonar.organization=yshan2028 \
            -Dsonar.sources=. \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.tests=test \
            -Dsonar.test.inclusions=**/*Test.java \
            -Dsonar.coverage.jacoco.xmlReportsPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.pullrequest.github.repository=${{ github.repository }}
        continue-on-error: true

  # ==================== 前端构建 ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:eslint -- --max-warnings 0
        continue-on-error: true

      - name: Type check
        run: npx vue-tsc --noEmit
        continue-on-error: true

      - name: Build for dev
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-pc/dist/
          retention-days: 1

  # ==================== 前端代码分析 (SonarCloud) ====================
  frontend-sonar:
    name: Frontend SonarCloud Analysis
    runs-on: ubuntu-24.04
    needs: [frontend-build]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          npx sonarscanner \
            -Dsonar.projectKey=yshan2028_Lest-frontend \
            -Dsonar.organization=yshan2028 \
            -Dsonar.sources=src \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts \
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.pullrequest.github.repository=${{ github.repository }}
        continue-on-error: true

  # ==================== Docker 镜像构建测试 ====================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare artifacts for Docker build
        run: |
          mkdir -p backend/lest-gateway/target
          cp artifacts/backend-jars/lest-gateway*.jar backend/lest-gateway/target/ 2>/dev/null || true
          mkdir -p backend/lest-auth/target
          cp artifacts/backend-jars/lest-auth*.jar backend/lest-auth/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-system/target
          cp artifacts/backend-jars/lest-system*.jar backend/lest-modules/lest-system/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-project/target
          cp artifacts/backend-jars/lest-project*.jar backend/lest-modules/lest-project/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-task/target
          cp artifacts/backend-jars/lest-task*.jar backend/lest-modules/lest-task/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-release/target
          cp artifacts/backend-jars/lest-release*.jar backend/lest-modules/lest-release/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-job/target
          cp artifacts/backend-jars/lest-job*.jar backend/lest-modules/lest-job/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-file/target
          cp artifacts/backend-jars/lest-file*.jar backend/lest-modules/lest-file/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-meeting/target
          cp artifacts/backend-jars/lest-meeting*.jar backend/lest-modules/lest-meeting/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-notification/target
          cp artifacts/backend-jars/lest-notification*.jar backend/lest-modules/lest-notification/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-ai/target
          cp artifacts/backend-jars/lest-ai*.jar backend/lest-modules/lest-ai/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-open/target
          cp artifacts/backend-jars/lest-open*.jar backend/lest-modules/lest-open/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-performance/target
          cp artifacts/backend-jars/lest-performance*.jar backend/lest-modules/lest-performance/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-plugin/target
          cp artifacts/backend-jars/lest-plugin*.jar backend/lest-modules/lest-plugin/target/ 2>/dev/null || true
          mkdir -p backend/lest-modules/lest-wakapi/target
          cp artifacts/backend-jars/lest-wakapi*.jar backend/lest-modules/lest-wakapi/target/ 2>/dev/null || true
          mkdir -p backend/lest-visual/lest-monitor/target
          cp artifacts/backend-jars/lest-monitor*.jar backend/lest-visual/lest-monitor/target/ 2>/dev/null || true
          mkdir -p backend/docker/nginx/html
          cp -r artifacts/frontend-dist/* backend/docker/nginx/html/ 2>/dev/null || true

      - name: Build gateway image
        run: |
          docker build \
            --build-arg MODULE=backend/lest-gateway \
            --build-arg SERVICE_PORT=8080 \
            -t lest-gateway:test \
            -f backend/docker/lest/gateway/dockerfile \
            ./backend

      - name: Build auth image
        run: |
          docker build \
            --build-arg MODULE=backend/lest-auth \
            --build-arg SERVICE_PORT=8096 \
            -t lest-auth:test \
            -f backend/docker/lest/auth/dockerfile \
            ./backend

      - name: Build nginx image
        if: false  # Disable nginx build in CI (no dockerfile exists)
        run: |
          docker build \
            -t lest-nginx:test \
            -f backend/docker/nginx/dockerfile \
            ./backend/docker/nginx

      - name: Images manifest
        run: |
          echo "=== Built images ===" && docker images lest-*/test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: trivy-fs-results.sarif
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy FS results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
        continue-on-error: true

  # ==================== CI 总结 ====================
  ci-summary:
    name: CI Summary
    needs: [backend-build, backend-test, frontend-build, backend-sonar, frontend-sonar, docker-build, security-scan]
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Set job status emoji
        run: |
          BUILD=${{ needs.backend-build.result == 'success' && '✅' || '❌' }}
          TEST=${{ needs.backend-test.result == 'success' && '✅' || (needs.backend-test.result == 'skipped' && '⏭️' || '⚠️') }}
          FRONTEND=${{ needs.frontend-build.result == 'success' && '✅' || '❌' }}
          SONAR_BE=${{ needs.backend-sonar.result == 'success' && '✅' || (needs.backend-sonar.result == 'skipped' && '⏭️' || '⚠️') }}
          SONAR_FE=${{ needs.frontend-sonar.result == 'success' && '✅' || (needs.frontend-sonar.result == 'skipped' && '⏭️' || '⚠️') }}
          DOCKER=${{ needs.docker-build.result == 'success' && '✅' || (needs.docker-build.result == 'skipped' && '⏭️' || '❌') }}
          TRIVY=${{ needs.security-scan.result == 'success' && '✅' || (needs.security-scan.result == 'skipped' && '⏭️' || '⚠️') }}

          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | $BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Test | $TEST |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend SonarCloud | $SONAR_BE |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | $FRONTEND |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend SonarCloud | $SONAR_FE |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | $DOCKER |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan (Trivy) | $TRIVY |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SonarCloud**: PR analysis enabled. Set \`SONAR_TOKEN\` in repo secrets to activate." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trivy**: Security scan results appear in the Security tab." >> $GITHUB_STEP_SUMMARY
