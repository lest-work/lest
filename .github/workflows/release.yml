name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      environment:
        description: 'Deployment environment (reserved for future deployment step)'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}/lest-platform
  DOCKERHUB_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}/lest-platform
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}/lest-platform
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ==================== 版本信息 ====================
  info:
    name: Release Info
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Calculate version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, SHA: $(echo $GITHUB_SHA | cut -c1-7)"

  # ==================== 后端构建 ====================
  backend-build:
    name: Build Backend JARs
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build JARs
        run: mvn clean package -DskipTests -q

      - name: Prepare JAR directory
        run: |
          # Flatten all service JARs into a single jar/ dir, named lest-<module>.jar
          # to match each Dockerfile's `COPY ./jar/lest-<module>.jar`.
          mkdir -p jar
          cp lest-gateway/target/lest-gateway-*.jar                          jar/lest-gateway.jar
          cp lest-auth/target/lest-auth-*.jar                                jar/lest-auth.jar
          cp lest-modules/lest-system/target/lest-system-*.jar               jar/lest-system.jar
          cp lest-modules/lest-project/target/lest-project-*.jar             jar/lest-project.jar
          cp lest-modules/lest-task/target/lest-task-*.jar                   jar/lest-task.jar
          cp lest-modules/lest-release/target/lest-release-*.jar             jar/lest-release.jar
          cp lest-modules/lest-job/target/lest-job-*.jar                     jar/lest-job.jar
          cp lest-modules/lest-file/target/lest-file-*.jar                   jar/lest-file.jar
          cp lest-modules/lest-meeting/target/lest-meeting-*.jar             jar/lest-meeting.jar
          cp lest-modules/lest-notification/target/lest-notification-*.jar   jar/lest-notification.jar
          cp lest-modules/lest-ai/target/lest-ai-*.jar                       jar/lest-ai.jar
          cp lest-modules/lest-open/target/lest-open-*.jar                   jar/lest-open.jar
          cp lest-modules/lest-performance/target/lest-performance-*.jar     jar/lest-performance.jar
          cp lest-modules/lest-plugin/target/lest-plugin-*.jar               jar/lest-plugin.jar
          cp lest-modules/lest-wakapi/target/lest-wakapi-*.jar               jar/lest-wakapi.jar
          cp lest-visual/lest-monitor/target/lest-monitor-*.jar              jar/lest-monitor.jar
          ls -la jar/

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: backend/jar/
          retention-days: 2

  # ==================== 前端构建 ====================
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install & Build
        run: npm ci && npm run build


      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 2

  # ==================== Docker 多架构镜像构建 ====================
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    needs: [backend-build, frontend-build, info]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: gateway
            path: backend/lest-gateway
            port: 8080
            dockerfile: backend/docker/lest/gateway/dockerfile
          - name: auth
            path: backend/lest-auth
            port: 8096
            dockerfile: backend/docker/lest/auth/dockerfile
          - name: modules-system
            path: backend/lest-modules/lest-system
            port: 8081
            dockerfile: backend/docker/lest/modules/system/dockerfile
          - name: modules-project
            path: backend/lest-modules/lest-project
            port: 8082
            dockerfile: backend/docker/lest/modules/project/dockerfile
          - name: modules-task
            path: backend/lest-modules/lest-task
            port: 8083
            dockerfile: backend/docker/lest/modules/task/dockerfile
          - name: modules-release
            path: backend/lest-modules/lest-release
            port: 8087
            dockerfile: backend/docker/lest/modules/release/dockerfile
          - name: modules-job
            path: backend/lest-modules/lest-job
            port: 9203
            dockerfile: backend/docker/lest/modules/job/dockerfile
          - name: modules-file
            path: backend/lest-modules/lest-file
            port: 8091
            dockerfile: backend/docker/lest/modules/file/dockerfile
          - name: modules-meeting
            path: backend/lest-modules/lest-meeting
            port: 8085
            dockerfile: backend/docker/lest/modules/meeting/dockerfile
          - name: modules-notification
            path: backend/lest-modules/lest-notification
            port: 8086
            dockerfile: backend/docker/lest/modules/notification/dockerfile
          - name: modules-ai
            path: backend/lest-modules/lest-ai
            port: 8090
            dockerfile: backend/docker/lest/modules/ai/dockerfile
          - name: modules-open
            path: backend/lest-modules/lest-open
            port: 8094
            dockerfile: backend/docker/lest/modules/open/dockerfile
          - name: modules-performance
            path: backend/lest-modules/lest-performance
            port: 8088
            dockerfile: backend/docker/lest/modules/performance/dockerfile
          - name: modules-plugin
            path: backend/lest-modules/lest-plugin
            port: 8092
            dockerfile: backend/docker/lest/modules/plugin/dockerfile
          - name: modules-wakapi
            path: backend/lest-modules/lest-wakapi
            port: 8089
            dockerfile: backend/docker/lest/modules/wakapi/dockerfile
          - name: visual-monitor
            path: backend/lest-visual/lest-monitor
            port: 9100
            dockerfile: backend/docker/lest/visual/monitor/dockerfile
          # 注：nginx 前端服务已从镜像构建中移除（backend/docker/nginx/ 目录不存在）
          # 前端静态资源已包含在 gateway 镜像或通过 CDN 分发
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download backend JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: artifacts

      - name: Detect optional registry secrets
        id: sec
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ALIYUN_AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_REG: ${{ secrets.ALIYUN_REGISTRY }}
        run: |
          [ -n "$DOCKERHUB_TOKEN" ] && echo "has_dockerhub=true" >> "$GITHUB_OUTPUT" || echo "has_dockerhub=false" >> "$GITHUB_OUTPUT"
          if [ -n "$ALIYUN_AK" ] && [ -n "$ALIYUN_REG" ]; then
            echo "has_aliyun=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_aliyun=false" >> "$GITHUB_OUTPUT"
          fi
          # Derive region-id from registry host (e.g. registry.cn-hangzhou.aliyuncs.com -> cn-hangzhou)
          REGION="$(echo "$ALIYUN_REG" | sed -nE 's/^registry\.([a-z0-9-]+)\.aliyuncs\.com.*/\1/p')"
          [ -z "$REGION" ] && REGION="cn-hangzhou"
          echo "aliyun_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Stage JAR for ${{ matrix.service.name }}
        run: |
          set -e
          # Dockerfiles COPY ./jar/lest-<module>.jar relative to build context (repo root)
          JAR_NAME="$(basename '${{ matrix.service.path }}')"   # e.g. lest-system, lest-gateway
          SRC="$(find artifacts -name "${JAR_NAME}.jar" -type f | head -1)"
          echo "Service ${{ matrix.service.name }} -> ${JAR_NAME}.jar (src: ${SRC})"
          test -n "$SRC"
          mkdir -p jar
          cp "$SRC" "jar/${JAR_NAME}.jar"
          ls -la jar/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.sec.outputs.has_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Aliyun ACR (via AccessKey)
        if: steps.sec.outputs.has_aliyun == 'true'
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ALIYUN_REGISTRY }}
          region-id: ${{ steps.sec.outputs.aliyun_region }}
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Compute image targets
        id: img
        run: |
          IMAGES="${GHCR_REGISTRY}/${{ matrix.service.name }}"
          if [ "${{ steps.sec.outputs.has_dockerhub }}" = "true" ]; then
            IMAGES="${IMAGES}"$'\n'"${DOCKERHUB_REGISTRY}/${{ matrix.service.name }}"
          fi
          if [ "${{ steps.sec.outputs.has_aliyun }}" = "true" ]; then
            IMAGES="${IMAGES}"$'\n'"${ALIYUN_REGISTRY}/${{ matrix.service.name }}"
          fi
          { echo "images<<EOF"; printf '%s\n' "$IMAGES"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Extract metadata for ${{ matrix.service.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.images }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.info.outputs.version }}
            type=sha,prefix=,suffix=-${{ needs.info.outputs.short_sha }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ==================== 生成变更日志 ====================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-24.04
    needs: [info]
    outputs:
      body: ${{ steps.cl.outputs.changelog }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        run: |
          CHANGELOG=$(git log --pretty=format:'%h %s (%an)' \
            ${{ github.event.inputs.version != '' && github.event.inputs.version || 'HEAD~10' }}..HEAD 2>/dev/null \
            | head -20)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


  # ==================== 创建 GitHub Release ====================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [info, changelog]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.info.outputs.version }}
          name: Release ${{ needs.info.outputs.version }}
          body: ${{ needs.changelog.outputs.body }}
          draft: true
        continue-on-error: true

