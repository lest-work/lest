name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lest-platform

jobs:
  # ==================== 构建 ====================
  build:
    name: Build & Push Images
    runs-on: ubuntu-24.04
    outputs:
      backend-tag: ${{ steps.meta.outputs.tags['backend'] }}
      frontend-tag: ${{ steps.meta.outputs.tags['frontend'] }}
      wakapi-tag: ${{ steps.meta.outputs.tags['wakapi'] }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend
            ${{ env.REGISTRY }}/${{ github.repository }}/wakapi
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-new
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags['backend'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-new
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags['frontend'] }}
          build-args: |
            VITE_API_URL=/api
            VITE_WAKAPI_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push wakapi
        uses: docker/build-push-action@v6
        with:
          context: ./wakapi
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags['wakapi'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到 Staging ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/lest-platform
            docker compose -f docker/production/docker-compose.prod.yml pull
            docker compose -f docker/production/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

  # ==================== 部署到 Production ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/lest-platform
            docker compose -f docker/production/docker-compose.prod.yml pull
            docker compose -f docker/production/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
