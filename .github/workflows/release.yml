name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      environment:
        description: 'Deployment environment (reserved for future deployment step)'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}/lest-platform
  DOCKERHUB_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}/lest-platform
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}/lest-platform
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ==================== 版本信息 ====================
  info:
    name: Release Info
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Calculate version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, SHA: $(echo $GITHUB_SHA | cut -c1-7)"

  # ==================== 后端构建 ====================
  backend-build:
    name: Build Backend JARs
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build JARs
        run: mvn clean package -DskipTests -q

      - name: Prepare JAR directories
        run: |
          mkdir -p jar
          # lest-gateway
          mkdir -p lest-gateway/jar
          cp lest-gateway/target/lest-gateway-*.jar lest-gateway/jar/lest-gateway.jar
          # lest-auth
          mkdir -p lest-auth/jar
          cp lest-auth/target/lest-auth-*.jar lest-auth/jar/lest-auth.jar
          # lest-modules-system
          mkdir -p lest-modules/lest-system/jar
          cp lest-modules/lest-system/target/lest-system-*.jar lest-modules/lest-system/jar/lest-modules-system.jar
          # lest-modules-job
          mkdir -p lest-modules/lest-job/jar
          cp lest-modules/lest-job/target/lest-job-*.jar lest-modules/lest-job/jar/lest-modules-job.jar
          # lest-modules-file
          mkdir -p lest-modules/lest-file/jar
          cp lest-modules/lest-file/target/lest-file-*.jar lest-modules/lest-file/jar/lest-modules-file.jar
          # lest-modules-project
          mkdir -p lest-modules/lest-project/jar
          cp lest-modules/lest-project/target/lest-project-*.jar lest-modules/lest-project/jar/lest-modules-project.jar
          # lest-modules-task
          mkdir -p lest-modules/lest-task/jar
          cp lest-modules/lest-task/target/lest-task-*.jar lest-modules/lest-task/jar/lest-modules-task.jar
          # lest-modules-release
          mkdir -p lest-modules/lest-release/jar
          cp lest-modules/lest-release/target/lest-release-*.jar lest-modules/lest-release/jar/lest-modules-release.jar
          # lest-modules-meeting
          mkdir -p lest-modules/lest-meeting/jar
          cp lest-modules/lest-meeting/target/lest-meeting-*.jar lest-modules/lest-meeting/jar/lest-modules-meeting.jar
          # lest-modules-notification
          mkdir -p lest-modules/lest-notification/jar
          cp lest-modules/lest-notification/target/lest-notification-*.jar lest-modules/lest-notification/jar/lest-modules-notification.jar
          # lest-modules-ai
          mkdir -p lest-modules/lest-ai/jar
          cp lest-modules/lest-ai/target/lest-ai-*.jar lest-modules/lest-ai/jar/lest-modules-ai.jar
          # lest-modules-open
          mkdir -p lest-modules/lest-open/jar
          cp lest-modules/lest-open/target/lest-open-*.jar lest-modules/lest-open/jar/lest-modules-open.jar
          # lest-modules-performance
          mkdir -p lest-modules/lest-performance/jar
          cp lest-modules/lest-performance/target/lest-performance-*.jar lest-modules/lest-performance/jar/lest-modules-performance.jar
          # lest-modules-plugin
          mkdir -p lest-modules/lest-plugin/jar
          cp lest-modules/lest-plugin/target/lest-plugin-*.jar lest-modules/lest-plugin/jar/lest-modules-plugin.jar
          # lest-modules-wakapi
          mkdir -p lest-modules/lest-wakapi/jar
          cp lest-modules/lest-wakapi/target/lest-wakapi-*.jar lest-modules/lest-wakapi/jar/lest-modules-wakapi.jar
          # lest-visual-monitor
          mkdir -p lest-visual/lest-monitor/jar
          cp lest-visual/lest-monitor/target/lest-monitor-*.jar lest-visual/lest-monitor/jar/lest-visual-monitor.jar

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: jar/
          retention-days: 2

  # ==================== 前端构建 ====================
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend-pc
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-pc/package-lock.json

      - name: Install & Build
        run: npm ci && npm run build


      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 2

  # ==================== Docker 多架构镜像构建 ====================
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    needs: [backend-build, frontend-build, info]
    strategy:
      matrix:
        service:
          - name: gateway
            path: backend/lest-gateway
            port: 8080
            dockerfile: backend/docker/lest/gateway/dockerfile
          - name: auth
            path: backend/lest-auth
            port: 8096
            dockerfile: backend/docker/lest/auth/dockerfile
          - name: modules-system
            path: backend/lest-modules/lest-system
            port: 8081
            dockerfile: backend/docker/lest/modules/system/dockerfile
          - name: modules-project
            path: backend/lest-modules/lest-project
            port: 8082
            dockerfile: backend/docker/lest/modules/project/dockerfile
          - name: modules-task
            path: backend/lest-modules/lest-task
            port: 8083
            dockerfile: backend/docker/lest/modules/task/dockerfile
          - name: modules-release
            path: backend/lest-modules/lest-release
            port: 8087
            dockerfile: backend/docker/lest/modules/release/dockerfile
          - name: modules-job
            path: backend/lest-modules/lest-job
            port: 9203
            dockerfile: backend/docker/lest/modules/job/dockerfile
          - name: modules-file
            path: backend/lest-modules/lest-file
            port: 8091
            dockerfile: backend/docker/lest/modules/file/dockerfile
          - name: modules-meeting
            path: backend/lest-modules/lest-meeting
            port: 8085
            dockerfile: backend/docker/lest/modules/meeting/dockerfile
          - name: modules-notification
            path: backend/lest-modules/lest-notification
            port: 8086
            dockerfile: backend/docker/lest/modules/notification/dockerfile
          - name: modules-ai
            path: backend/lest-modules/lest-ai
            port: 8090
            dockerfile: backend/docker/lest/modules/ai/dockerfile
          - name: modules-open
            path: backend/lest-modules/lest-open
            port: 8094
            dockerfile: backend/docker/lest/modules/open/dockerfile
          - name: modules-performance
            path: backend/lest-modules/lest-performance
            port: 8088
            dockerfile: backend/docker/lest/modules/performance/dockerfile
          - name: modules-plugin
            path: backend/lest-modules/lest-plugin
            port: 8092
            dockerfile: backend/docker/lest/modules/plugin/dockerfile
          - name: modules-wakapi
            path: backend/lest-modules/lest-wakapi
            port: 8089
            dockerfile: backend/docker/lest/modules/wakapi/dockerfile
          - name: visual-monitor
            path: backend/lest-visual/lest-monitor
            port: 9100
            dockerfile: backend/docker/lest/visual/monitor/dockerfile
          # 注：nginx 前端服务已从镜像构建中移除（backend/docker/nginx/ 目录不存在）
          # 前端静态资源已包含在 gateway 镜像或通过 CDN 分发
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts for Docker build
        run: |
          # Restore backend JARs to their Maven target directory structure
          # so the Dockerfiles can find them with /target/*.jar pattern
          mkdir -p backend/lest-gateway/target
          cp artifacts/backend-jars/lest-gateway*.jar backend/lest-gateway/target/ 2>/dev/null || true

          mkdir -p backend/lest-auth/target
          cp artifacts/backend-jars/lest-auth*.jar backend/lest-auth/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-system/target
          cp artifacts/backend-jars/lest-system*.jar backend/lest-modules/lest-system/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-project/target
          cp artifacts/backend-jars/lest-project*.jar backend/lest-modules/lest-project/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-task/target
          cp artifacts/backend-jars/lest-task*.jar backend/lest-modules/lest-task/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-release/target
          cp artifacts/backend-jars/lest-release*.jar backend/lest-modules/lest-release/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-job/target
          cp artifacts/backend-jars/lest-job*.jar backend/lest-modules/lest-job/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-file/target
          cp artifacts/backend-jars/lest-file*.jar backend/lest-modules/lest-file/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-meeting/target
          cp artifacts/backend-jars/lest-meeting*.jar backend/lest-modules/lest-meeting/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-notification/target
          cp artifacts/backend-jars/lest-notification*.jar backend/lest-modules/lest-notification/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-ai/target
          cp artifacts/backend-jars/lest-ai*.jar backend/lest-modules/lest-ai/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-open/target
          cp artifacts/backend-jars/lest-open*.jar backend/lest-modules/lest-open/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-performance/target
          cp artifacts/backend-jars/lest-performance*.jar backend/lest-modules/lest-performance/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-plugin/target
          cp artifacts/backend-jars/lest-plugin*.jar backend/lest-modules/lest-plugin/target/ 2>/dev/null || true

          mkdir -p backend/lest-modules/lest-wakapi/target
          cp artifacts/backend-jars/lest-wakapi*.jar backend/lest-modules/lest-wakapi/target/ 2>/dev/null || true

          mkdir -p backend/lest-visual/lest-monitor/target
          cp artifacts/backend-jars/lest-monitor*.jar backend/lest-visual/lest-monitor/target/ 2>/dev/null || true

          # Restore frontend dist
          # 注：nginx/html 目录仅为预留，当前版本前端静态文件通过 CDN 分发或挂载到 gateway

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata for ${{ matrix.service.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ matrix.service.name }}
            ${{ env.DOCKERHUB_REGISTRY }}/${{ matrix.service.name }}
            ${{ env.ALIYUN_REGISTRY }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.info.outputs.version }}
            type=sha,prefix=,suffix=-${{ needs.info.outputs.short_sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODULE=${{ matrix.service.path }}
            SERVICE_PORT=${{ matrix.service.port }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==================== 生成变更日志 ====================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-24.04
    needs: [info]
    outputs:
      body: ${{ steps.cl.outputs.changelog }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        run: |
          CHANGELOG=$(git log --pretty=format:'%h %s (%an)' \
            ${{ github.event.inputs.version != '' && github.event.inputs.version || 'HEAD~10' }}..HEAD 2>/dev/null \
            | head -20)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


  # ==================== 创建 GitHub Release ====================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [info, changelog]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.info.outputs.version }}
          name: Release ${{ needs.info.outputs.version }}
          body: ${{ needs.changelog.outputs.body }}
          draft: true
        continue-on-error: true

