# PR auto-labeler: labels PRs based on changed files
# Syntax for actions/labeler@v5
backend:
  - changed-files:
      - any-glob: ['backend/**']
frontend:
  - changed-files:
      - any-glob: ['frontend-pc/**']
infrastructure:
  - changed-files:
      - any-glob: ['backend/docker/**']
ci-cd:
  - changed-files:
      - any-glob: ['.github/**']
docs:
  - changed-files:
      - any-glob: ['docs/**']
