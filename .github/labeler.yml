# PR auto-labeler: labels PRs based on changed files
# Syntax for actions/labeler@v5
backend:
  - changed-files:
      - any-path: ['backend/**']
frontend:
  - changed-files:
      - any-path: ['frontend-pc/**']
infrastructure:
  - changed-files:
      - any-path: ['backend/docker/**']
ci-cd:
  - changed-files:
      - any-path: ['.github/**']
docs:
  - changed-files:
      - any-path: ['docs/**']
