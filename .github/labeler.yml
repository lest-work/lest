# PR auto-labeler: labels PRs based on changed files
# Syntax for actions/labeler@v5
backend:
  - changed-files:
      - any-glob-to-any-file: ['backend/**']
frontend:
  - changed-files:
      - any-glob-to-any-file: ['frontend-pc/**']
infrastructure:
  - changed-files:
      - any-glob-to-any-file: ['backend/docker/**']
ci-cd:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']
docs:
  - changed-files:
      - any-glob-to-any-file: ['docs/**']
