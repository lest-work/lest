<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient: deep blue to teal -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Icon background gradient -->
    <linearGradient id="iconBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Icon border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.25"/>
    </filter>

    <!-- Subtle glow for icon -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with gradient fill -->
  <circle cx="200" cy="175" r="130" fill="url(#iconBgGrad)"/>

  <!-- Hexagonal icon base - stylized letter "L" -->
  <!-- Outer hexagon frame -->
  <path d="M200 60 L282 105 L282 195 L200 240 L118 195 L118 105 Z"
        fill="none" stroke="url(#borderGrad)" stroke-width="3"
        stroke-linejoin="round" opacity="0.4"/>

  <!-- Inner filled hexagon -->
  <path d="M200 68 L276 110 L276 192 L200 234 L124 192 L124 110 Z"
        fill="url(#mainGrad)" opacity="0.12"/>

  <!-- Stylized "L" letter formed by geometric shapes -->
  <!-- Vertical bar of L -->
  <rect x="158" y="95" width="22" height="90" rx="6" ry="6"
        fill="url(#mainGrad)" filter="url(#glow)"/>

  <!-- Horizontal bar of L -->
  <rect x="158" y="167" width="60" height="22" rx="6" ry="6"
        fill="url(#mainGrad)" filter="url(#glow)"/>

  <!-- L accent dot - top of vertical bar -->
  <circle cx="169" cy="88" r="8" fill="url(#mainGrad)" opacity="0.8"/>

  <!-- Abstract cloud elements - small shapes suggesting cloud-native -->
  <circle cx="248" cy="118" r="5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="260" cy="126" r="4" fill="#06b6d4" opacity="0.4"/>
  <circle cx="240" cy="130" r="3" fill="#0ea5e9" opacity="0.35"/>

  <!-- "LEST" wordmark -->
  <text x="200" y="300"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="56"
        font-weight="700"
        fill="#1e3a8a"
        text-anchor="middle"
        letter-spacing="8">LEST</text>

  <!-- Platform subtitle -->
  <text x="200" y="335"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#64748b"
        text-anchor="middle"
        letter-spacing="6">PLATFORM</text>

  <!-- Decorative underline -->
  <rect x="120" y="348" width="160" height="2.5" rx="1.25"
        fill="url(#mainGrad)" opacity="0.5"/>
</svg>
