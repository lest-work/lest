sonar.projectKey=lest-work_lest-frontend
sonar.organization=lest-work

# Source directories
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test coverage
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclude build artifacts
sonar.exclusions=node_modules/**,dist/**,build/**,public/**
sonar.coverage.exclusions=node_modules/**,dist/**,build/**

# Vue support
sonar.typescript.embeddedDbDriver=0
