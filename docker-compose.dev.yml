version: '3.8'

x-service-env: &service-env
  NACOS_ENABLED: "true"
  MYSQL_HOST: mysql
  MYSQL_DB: lest_platform
  MYSQL_USERNAME: root
  MYSQL_PASSWORD: "12345678"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  NACOS_HOST: nacos
  NACOS_PORT: "8848"

x-java-opts: &java-opts
  JAVA_OPTS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:+UseG1GC
    -XX:+ExitOnOutOfMemoryError
    -Djava.security.egd=file:/dev/./urandom

networks:
  lest-dev-net:
    driver: bridge

services:
  # ==================== 基础设施 ====================
  mysql:
    container_name: lest-dev-mysql
    image: mysql:9.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: lest_platform
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/01_lest_platform_init.sql:/docker-entrypoint-initdb.d/01_lest_platform_init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+8:00
      --lower-case-table-names=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lest-dev-net

  redis:
    container_name: lest-dev-redis
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lest-dev-net

  nacos:
    container_name: lest-dev-nacos
    image: nacos/nacos-server:v3.2.1
    ports:
      - "8848:8848"
      - "9848:9848"
      - "8880:8080"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: lest-platform-key
      NACOS_AUTH_IDENTITY_VALUE: lest-platform-value
      JVM_XMS: 256m
      JVM_XMX: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - lest-dev-net

  kafka:
    container_name: lest-dev-kafka
    image: apache/kafka:4.3.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - lest-dev-net

  minio:
    container_name: lest-dev-minio
    image: pgsty/minio:RELEASE.2026-04-17T00-00-00Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lest-dev-net

  # ==================== 前端 ====================
  lest-frontend:
    container_name: lest-dev-frontend
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-pc:/app
      - frontend-node-modules:/app/node_modules
    environment:
      GATEWAY_URL: http://lest-gateway:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - lest-dev-net

  # ==================== 后端服务 ====================
  lest-gateway:
    container_name: lest-dev-gateway
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-gateway
        SERVICE_PORT: 8080
    ports:
      - "8080:8080"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-auth:
    container_name: lest-dev-auth
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-auth
        SERVICE_PORT: 8096
    ports:
      - "8096:8096"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8096
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-system:
    container_name: lest-dev-system
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-system
        SERVICE_PORT: 8081
    ports:
      - "8081:8081"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-project:
    container_name: lest-dev-project
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-project
        SERVICE_PORT: 8082
    ports:
      - "8082:8082"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-task:
    container_name: lest-dev-task
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-task
        SERVICE_PORT: 8083
    ports:
      - "8083:8083"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8083
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-release:
    container_name: lest-dev-release
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-release
        SERVICE_PORT: 8087
    ports:
      - "8087:8087"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8087
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-file:
    container_name: lest-dev-file
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-file
        SERVICE_PORT: 8091
    ports:
      - "8091:8091"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8091
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lest-dev-net

  lest-job:
    container_name: lest-dev-job
    build:
      context: ./backend
      dockerfile: ../docker-dev.Dockerfile
      args:
        MODULE: lest-modules/lest-job
        SERVICE_PORT: 8084
    ports:
      - "8084:8084"
    environment:
      <<: [*service-env, *java-opts]
      SERVICE_PORT: 8084
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lest-dev-net

volumes:
  mysql-data:
  redis-data:
  minio-data:
  frontend-node-modules:
