server:
  port: 8080

spring:
  application:
    name: lest-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

  # Redis (for rate limiter)
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # Nacos service discovery
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_APP_GROUP:DEFAULT_GROUP}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}

    # Gateway routes - Spring Cloud Gateway 5.x uses server.webflux prefix
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: lest-auth
              uri: lb://lest-auth
              predicates:
                - Path=/auth/**

            - id: lest-system
              uri: lb://lest-system
              predicates:
                - Path=/system/**

            - id: lest-project
              uri: lb://lest-project
              predicates:
                - Path=/project/**

            - id: lest-task
              uri: lb://lest-task
              predicates:
                - Path=/task/**

            - id: lest-code
              uri: lb://lest-code
              predicates:
                - Path=/code/**

            - id: lest-meeting
              uri: lb://lest-meeting
              predicates:
                - Path=/meeting/**

            - id: lest-file
              uri: lb://lest-file
              predicates:
                - Path=/file/**

            - id: lest-notification
              uri: lb://lest-notification
              predicates:
                - Path=/notification/**

            - id: lest-ai
              uri: lb://lest-ai
              predicates:
                - Path=/ai/**

            - id: lest-performance
              uri: lb://lest-performance
              predicates:
                - Path=/performance/**

            - id: lest-open
              uri: lb://lest-open
              predicates:
                - Path=/open/**

            - id: lest-release
              uri: lb://lest-release
              predicates:
                - Path=/release/**

            - id: lest-plugin
              uri: lb://lest-plugin
              predicates:
                - Path=/plugin/**

            - id: lest-wakapi
              uri: lb://lest-wakapi
              predicates:
                - Path=/wakapi/**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Resilience4j circuit breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      lest-auth-cb:
        baseConfig: default
      lest-system-cb:
        baseConfig: default

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.lest.gateway: DEBUG
